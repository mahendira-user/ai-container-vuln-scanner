<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SBOM Security System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    font-family: 'Segoe UI';
}

/* NAVBAR */
.navbar{
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
}

/* CARD */
.card{
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* BUTTON */
.btn-custom{
    background: linear-gradient(45deg,#ff416c,#ff4b2b);
    border:none;
    color:white;
}

.btn-custom:hover{
    transform: scale(1.05);
}

/* FOOTER */
.footer{
    margin-top:50px;
    padding:15px;
    text-align:center;
    background: rgba(0,0,0,0.8);
}

/* RISK COLORS */
.low{color:#00ff9c;}
.medium{color:#ffd166;}
.high{color:#ff4b2b;}
.critical{color:#ff0000;}

</style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold">🔐 SBOM Security</a>

<div>
<a href="/" class="btn btn-sm btn-outline-light">Home</a>
<a href="/login" class="btn btn-sm btn-outline-light">Tester</a>
<a href="/admin" class="btn btn-sm btn-outline-light">Admin</a>
</div>

</div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

<div class="footer">
© 2026 SBOM Security | Graph-Based Risk Analysis
</div>

</body>
</html>
